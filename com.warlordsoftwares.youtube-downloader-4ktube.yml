app-id: com.warlordsoftwares.youtube-downloader-4ktube
runtime: org.kde.Platform
runtime-version: "5.15-25.08"
sdk: org.kde.Sdk
base: com.riverbankcomputing.PyQt.BaseApp
base-version: "5.15-25.08"
command: 4ktube.sh

tags:
  - proprietary

finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --filesystem=xdg-download
  - --filesystem=xdg-documents
  - --filesystem=xdg-run/gvfsd
  - --device=dri
  - --socket=pulseaudio
  - --env=QTWEBENGINEPROCESS_PATH=/app/bin/QtWebEngineProcess
  - --env=QTWEBENGINE_CHROMIUM_FLAGS=--no-sandbox
  - --env=QTWEBENGINE_DISABLE_SANDBOX=1
  - --env=QTWEBENGINE_RESOURCES_PATH=/app/share/qt5/resources
  - --env=QTWEBENGINE_LOCALES_PATH=/app/share/qt5/translations/qtwebengine_locales

cleanup-commands:
  - /app/cleanup-BaseApp.sh

cleanup:
  - /include
  - /lib/pkgconfig

modules:
  - name: luajit
    no-autogen: true
    cleanup:
      - /bin
      - /include
      - /lib/pkgconfig
      - /share/man
    sources:
      - type: git
        url: https://github.com/LuaJIT/LuaJIT.git
        disable-shallow-clone: true
        commit: 659a61693aa3b87661864ad0f12eee14c865cd7f
      - type: shell
        commands:
          - sed -i 's|/usr/local|/app|' ./Makefile

  - name: libass
    config-opts:
      - --disable-static
    sources:
      - type: archive
        url: https://github.com/libass/libass/releases/download/0.17.4/libass-0.17.4.tar.xz
        sha256: 78f1179b838d025e9c26e8fef33f8092f65611444ffa1bfc0cfac6a33511a05a

  - name: libplacebo
    buildsystem: meson
    config-opts:
      - -Dvulkan=disabled
      - -Dshaderc=disabled
    sources:
      - type: git
        url: https://github.com/haasn/libplacebo.git
        tag: v7.360.1
        commit: cee9b076f2c63104ccfd497fa79c39a867293ec4

  - name: mpv
    buildsystem: meson
    build-options:
      cflags: -DNDEBUG=1
    config-opts:
      - -Dlibmpv=false
      - -Dbuild-date=false
      - -Dpulse=enabled
      - -Dalsa=enabled
      - -Dmanpage-build=disabled
      - -Dcdda=disabled
      - -Ddvbin=disabled
      - -Ddvdnav=disabled
      - -Djavascript=disabled
      - -Dlibarchive=disabled
      - -Dlua=enabled
      - -Dshaderc=disabled
      - -Dvulkan=disabled
    sources:
      - type: archive
        url: https://github.com/mpv-player/mpv/archive/refs/tags/v0.41.0.tar.gz
        sha256: ee21092a5ee427353392360929dc64645c54479aefdb5babc5cfbb5fad626209

  - python3-req.json
  - python3-yt-dlp.json
  - deno.json
  - yt-dlp-ejs.json

  - name: youtube-downloader-4ktube
    buildsystem: simple
    build-commands:
      - mkdir -p ${FLATPAK_DEST}/4ktube
      - cp -r * ${FLATPAK_DEST}/4ktube
      - install -Dm755 ${FLATPAK_DEST}/4ktube/4ktube.sh ${FLATPAK_DEST}/bin/4ktube.sh
      - install -Dm644 ${FLATPAK_DEST}/4ktube/share/icons/icon.png ${FLATPAK_DEST}/share/icons/hicolor/512x512/apps/com.warlordsoftwares.youtube-downloader-4ktube.png
      - install -Dm644 ${FLATPAK_DEST}/4ktube/share/applications/youtube-downloader-4ktube.desktop ${FLATPAK_DEST}/share/applications/com.warlordsoftwares.youtube-downloader-4ktube.desktop
      - desktop-file-edit --set-icon=${FLATPAK_ID} ${FLATPAK_DEST}/share/applications/com.warlordsoftwares.youtube-downloader-4ktube.desktop
      - install -Dm644 ${FLATPAK_DEST}/4ktube/share/metainfo/com.warlordsoftwares.youtube-downloader-4ktube.metainfo.xml ${FLATPAK_DEST}/share/metainfo/com.warlordsoftwares.youtube-downloader-4ktube.metainfo.xml
    sources:
      - type: archive
        url: https://warlordsoftwares.com/static/app_builds/flatpak/FLATPAK_4KTUBE.tar.gz
        sha256: ad0bee4c5fc62e0ff434d1d7e697016fb388f333cc9916bba97431c836ad1387




